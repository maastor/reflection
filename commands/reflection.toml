description = "Start (or stop) a codebase reflection round; add 'auto' to apply + commit without approval"
prompt = "Begin a reflection round. {{args}}\n\nIf a REFLECTION MODE block was injected, follow it. Otherwise: pick ONE question about this codebase (prefer one not covered recently in reflection-changelog.md), reflect deeply, find ONE concrete validated issue (cite file:line, verify before claiming). By default propose a minimal fix (YAGNI) and wait for my approval before editing. If args include 'auto' (or autoApply is set in .reflection/config.json), instead apply the minimal fix directly and commit it as `reflection(<slug>): <summary>` — one commit per fix. After it's resolved, append an entry to reflection-changelog.md. If args name a question slug, use that question. If args say stop/done/off, end the round. Be brief."
