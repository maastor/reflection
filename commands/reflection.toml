description = "Start (or stop) a codebase reflection round on one randomly chosen question"
prompt = "Begin a reflection round. {{args}}\n\nIf a REFLECTION MODE block was injected, follow it. Otherwise: pick ONE question about this codebase (prefer one not covered recently in reflection-changelog.md), reflect deeply, find ONE concrete validated issue (cite file:line, verify before claiming), and propose a minimal fix (YAGNI) — do not edit until I approve. After it's resolved, append an entry to reflection-changelog.md. If args name a question slug, use that question. If args say stop/done/off, end the round. Be brief."
